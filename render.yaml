services:
  - type: web
    name: ojt-system-v2-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
